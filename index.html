<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Papers Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --card-bg: #e0e0e0;
            --text: #000000;
            --text-secondary: #555555;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            /* Mobile-first layout styling */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            text-align: center;
            margin-bottom: 1rem;
        }

        .brand-title {
            font-size: 2.75rem;
            font-weight: 900;
            margin: 0 0 0.5rem 0;
            letter-spacing: -1px;
        }

        .banner-container {
            width: 100%;
            background: linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%);
            padding: 1rem 0;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            position: relative;
            font-weight: bold;
            font-size: 1.5rem;
            color: #1e1b4b;
        }

        .banner-container::before {
            content: "Real";
            position: absolute;
            top: -2px;
            left: 58%;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: #000;
        }

        /* Clean Selector Heading matching the snapshot request */
        .selector-heading {
            color: #000;
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 1.5rem 0;
            text-align: center;
        }

        .nav-controls {
            display: flex;
            justify-content: flex-start;
            width: 100%;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .btn-nav {
            background: none;
            border: 1px solid #ccc;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 2-Column Grid Layout used ONLY for University and College levels */
        .funnel-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            width: 100%;
            padding: 0 0.5rem;
            box-sizing: border-box;
        }

        /* Card Layout matching the layout view */
        .grid-item {
            background-color: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            padding: 0;
            text-align: left;
            transition: transform 0.2s;
        }

        .grid-item:hover {
            transform: scale(1.02);
        }

        .card-image-area {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            background-color: #b0b0b0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-image-area svg {
            width: 40%;
            height: 40%;
            opacity: 0.6;
        }

        .card-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--text);
            margin: 0;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* List Layout for Course, Semester, and Paper steps */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            padding: 0 0.5rem;
            box-sizing: border-box;
        }

        .list-item {
            background-color: #f1f5f9;
            padding: 1.1rem 1.2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        .list-item:hover {
            background-color: #e2e8f0;
        }

        .list-arrow {
            color: var(--primary);
            font-weight: bold;
        }

        /* Final Paper Item layout styling */
        .paper-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 1.1rem 1.2rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .paper-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .view-btn {
            color: var(--primary);
            background: none;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        .view-btn:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 2rem 0;
            width: 100%;
        }

        /* Secure Document Overlay Window Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 5vh auto;
            padding: 20px;
            width: 85%;
            max-width: 700px;
            height: 80vh;
            border-radius: 16px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">
        <header>
            <h1 class="brand-title">collegepapers.in</h1>
            <div class="banner-container">Select Your Paper</div>
            <!-- Dynamic Step Heading matches level requests natively -->
            <h2 id="stepHeading" class="selector-heading">Select Your University</h2>

            <div class="nav-controls">
                <button id="backBtn" class="btn-nav" onclick="goBack()" style="visibility: hidden;">← Back</button>
            </div>
        </header>

        <div id="loading" class="loading" style="display: none;">Loading choices...</div>
        <div id="displayArea"></div>
    </div>

    <script>
        (function () {
            const SUPABASE_URL = "https://osdqszlyyhetdnlargrn.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHFzemx5eWhldGRubGFyZ3JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODk5MDMsImV4cCI6MjA5NzI2NTkwM30.wVHU1yPCgz0w6U2SwjvdK0j5HmS5mXUnwwXAwFuPwAM";

            const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let selection = {
                university: null,
                college: null,
                course: null,
                semester: null
            };

            async function renderStep() {
                const displayArea = document.getElementById('displayArea');
                const loadingText = document.getElementById('loading');
                const stepHeading = document.getElementById('stepHeading');
                const backBtn = document.getElementById('backBtn');

                loadingText.style.display = 'block';
                displayArea.innerHTML = '';

                backBtn.style.visibility = selection.university ? 'visible' : 'hidden';

                try {
                    let query = client.from('papers_metadata');

                    // LEVEL 1: Select University
                    if (!selection.university) {
                        stepHeading.innerText = "Select Your University";
                        const { data, error } = await query.select('university, uni_image_url');
                        if (error) throw error;

                        // Filter out duplicates uniquely mapping objects properly
                        const uniqueUnis = [];
                        const map = new Map();
                        for (const item of data) {
                            if (!map.has(item.university)) {
                                map.set(item.university, true);
                                uniqueUnis.push({ name: item.university, img: item.uni_image_url });
                            }
                        }
                        renderCardsGrid(uniqueUnis, 'university');
                    }
                    // LEVEL 2: Select College
                    else if (!selection.college) {
                        stepHeading.innerText = "Select Your College";
                        const { data, error } = await query.select('college, col_image_url').eq('university', selection.university);
                        if (error) throw error;

                        const uniqueColleges = [];
                        const map = new Map();
                        for (const item of data) {
                            if (!map.has(item.college)) {
                                map.set(item.college, true);
                                uniqueColleges.push({ name: item.college, img: item.col_image_url });
                            }
                        }
                        renderCardsGrid(uniqueColleges, 'college');
                    }
                    // LEVEL 3: Select Course
                    else if (!selection.course) {
                        stepHeading.innerText = "Select Your Course";
                        const { data, error } = await query.select('course').eq('university', selection.university).eq('college', selection.college);
                        if (error) throw error;

                        const uniqueCourses = [...new Set(data.map(item => item.course))];
                        renderFlatListView(uniqueCourses, 'course');
                    }
                    // LEVEL 4: Select Semester
                    else if (!selection.semester) {
                        stepHeading.innerText = "Select Your Semester";
                        const { data, error } = await query.select('semester').eq('university', selection.university).eq('college', selection.college).eq('course', selection.course);
                        if (error) throw error;

                        const uniqueSems = [...new Set(data.map(item => item.semester))];
                        renderFlatListView(uniqueSems, 'semester');
                    }
                    // LEVEL 5: Select Subject / View Papers
                    else {
                        stepHeading.innerText = "Select Your Subject";
                        const { data, error } = await query.select('*')
                            .eq('university', selection.university)
                            .eq('college', selection.college)
                            .eq('course', selection.course)
                            .eq('semester', selection.semester);

                        if (error) throw error;

                        if (!data || data.length === 0) {
                            displayArea.innerHTML = '<p class="loading">No exam papers found.</p>';
                        } else {
                            const listWrapper = document.createElement('div');
                            listWrapper.className = 'list-container';
                            data.forEach(paper => {
                                const itemHtml = `
                                    <div class="paper-item">
                                        <span class="paper-title">${paper.subject}</span>
                                        <button class="view-btn" onclick="openPdf('${paper.file_url}')">View PDF</button>
                                    </div>
                                `;
                                listWrapper.insertAdjacentHTML('beforeend', itemHtml);
                            });
                            displayArea.appendChild(listWrapper);
                        }
                    }
                } catch (err) {
                    console.error("Navigation Process Error:", err);
                    displayArea.innerHTML = '<p class="loading">Error parsing choices.</p>';
                } finally {
                    loadingText.style.display = 'none';
                }
            }

            // LEVEL 1 & 2 Rendering: Renders the 2-column image cards layout
            function renderCardsGrid(items, stepKey) {
                const displayArea = document.getElementById('displayArea');
                displayArea.className = 'funnel-grid'; // Use CSS grid structure rules

                if (!items || items.length === 0) {
                    displayArea.innerHTML = '<p class="loading">No options available.</p>';
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('button');
                    card.className = 'grid-item';

                    // Uses database columns if present, fallback to placeholder icon vector asset cleanly
                    const imageMarkup = item.img ? `<img src="${item.img}" alt="${item.name}">` : `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <path d="M21 15l-5-5L5 21" />
                        </svg>
                    `;

                    card.innerHTML = `
                        <div class="card-image-area">${imageMarkup}</div>
                        <div class="card-info">
                            <h3 class="card-title">${item.name}</h3>
                            <p class="card-subtitle">Raipur</p>
                        </div>
                    `;

                    card.onclick = () => selectOption(stepKey, item.name);
                    displayArea.appendChild(card);
                });
            }

            // LEVEL 3, 4, 5 Rendering: Switches layout cleanly to a clean flat vertical list
            function renderFlatListView(items, stepKey) {
                const displayArea = document.getElementById('displayArea');
                displayArea.className = 'list-container'; // Discard grid system, use flex list container rules

                if (!items || items.length === 0) {
                    displayArea.innerHTML = '<p class="loading">No choices found.</p>';
                    return;
                }

                items.forEach(item => {
                    const listItem = document.createElement('button');
                    listItem.className = 'list-item';

                    const textLabel = stepKey === 'semester' ? `Semester ${item}` : item;
                    listItem.innerHTML = `<span>${textLabel}</span> <span class="list-arrow">→</span>`;

                    listItem.onclick = () => selectOption(stepKey, item);
                    displayArea.appendChild(listItem);
                });
            }

            function selectOption(key, value) {
                selection[key] = value;
                renderStep();
            }

            function goBack() {
                if (selection.semester) selection.semester = null;
                else if (selection.course) selection.course = null;
                else if (selection.college) selection.college = null;
                else if (selection.university) selection.university = null;
                renderStep();
            }

            async function openPdf(path) {
                const loadingText = document.getElementById('loading');
                loadingText.innerText = "Opening document window...";
                loadingText.style.display = 'block';

                try {
                    const { data, error } = await client.storage
                        .from('papers')
                        .createSignedUrl(path, 60);

                    if (error) throw error;

                    document.getElementById('pdfViewer').src = data.signedUrl;
                    document.getElementById('pdfModal').style.display = 'block';
                    loadingText.style.display = 'none';
                } catch (err) {
                    console.error("Secure Link Error:", err);
                    loadingText.innerText = "Error opening file.";
                }
            }

            function closeModal() {
                document.getElementById('pdfModal').style.display = 'none';
                document.getElementById('pdfViewer').src = '';
            }

            window.openPdf = openPdf;
            window.closeModal = closeModal;
            window.goBack = goBack;
            window.onload = renderStep;
        })();
    </script>

    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <iframe id="pdfViewer" src="" width="100%" height="100%"></iframe>
        </div>
    </div>

</body>

</html>
